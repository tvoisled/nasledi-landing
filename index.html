<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>#НАСЛЕДИ — Карта следов</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

    /* Оверлей с текстом и кнопкой */
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%);
      backdrop-filter: blur(3px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none; /* чтобы мышь проходила к canvas */
    }
    /* Контейнер контента возвращает курсорные события */
    .overlay .content {
      pointer-events: auto;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    /* Когда оверлей скрыт */
    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .overlay.hidden .content {
      transform: translateY(30px);
    }

    h1 { font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 300; letter-spacing: 0.15em; margin: 0; color: #fff; }
    .tagline { font-size: 1.2rem; opacity: 0.8; margin: 1rem 0; color: #fff; }
    .btn {
      display: inline-block; padding: 0.8rem 2rem; margin-top: 1.5rem;
      border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1);
      color: white; text-decoration: none; border-radius: 40px;
      font-size: 1rem; transition: 0.3s; cursor: pointer;
    }
    .btn:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 20px rgba(180,130,255,0.5); }

    /* Футер-подсказка */
    .footer {
      position: absolute; bottom: 3rem; width: 100%; text-align: center;
      color: #aaa; font-size: 0.9rem; z-index: 1; pointer-events: none;
      transition: opacity 0.8s;
    }
    .footer.hidden { opacity: 0; }

    /* Модальное окно */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
    }
    .modal.active { display: flex; }
    .modal-box {
      background: #1a1a2e; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 2rem; max-width: 350px; text-align: center; color: white;
    }
    .modal-box input {
      width: 100%; padding: 0.7rem; margin: 1rem 0; border: 1px solid #666;
      background: #2a2a3a; color: white; border-radius: 8px; font-size: 1rem;
    }
    .modal-box button {
      background: #5a4a9a; border: none; padding: 0.7rem 2rem; color: white;
      border-radius: 40px; font-size: 1rem; cursor: pointer;
    }
    .modal-box .close {
      float: right; cursor: pointer; font-size: 1.5rem; opacity: 0.6;
    }
  </style>
</head>
<body>
  <!-- Оверлей -->
  <div class="overlay" id="overlay">
    <div class="content">
      <h1>Карта следов</h1>
      <p class="tagline">#НАСЛЕДИ — дышащая вселенная памяти</p>
      <button class="btn" id="enterBtn">Войти в созвездие</button>
    </div>
  </div>

  <!-- Подсказка внизу -->
  <div class="footer" id="footerHint">исследуйте карту — наведите на точку</div>

  <!-- Модальное окно -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <span class="close" id="closeModal">&times;</span>
      <h2 style="margin-top:0">Присоединиться к #НАСЛЕДИ</h2>
      <p>Оставьте email, и мы пришлём приглашение на открытие</p>
      <input type="email" placeholder="ваш@email.ru" />
      <button>Отправить</button>
    </div>
  </div>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // ==================== УПРАВЛЕНИЕ ОВЕРЛЕЕМ И МОДАЛКОЙ ====================
    const overlay = document.getElementById('overlay');
    const footerHint = document.getElementById('footerHint');
    const enterBtn = document.getElementById('enterBtn');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');

    let hintHidden = false; // чтобы скрыть подсказку только раз

    // Скрыть оверлей и подсказку
    function hideOverlay() {
      overlay.classList.add('hidden');
      if (!hintHidden) {
        footerHint.classList.add('hidden');
        hintHidden = true;
      }
    }

    // Показать оверлей обратно (если мышь ушла с карты)
    function showOverlay() {
      overlay.classList.remove('hidden');
    }

    // Кнопка «Войти» открывает модалку
    enterBtn.addEventListener('click', (e) => {
      e.preventDefault();
      modal.classList.add('active');
    });

    closeModal.addEventListener('click', () => {
      modal.classList.remove('active');
    });
    window.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });

    // ==================== THREE.JS СЦЕНА ====================
    const scene = new THREE.Scene();
    const frustumSize = 1000;
    const aspect = window.innerWidth / window.innerHeight;
    const camera = new THREE.OrthographicCamera(
      frustumSize * aspect / -2, frustumSize * aspect / 2,
      frustumSize / 2, frustumSize / -2, 0.1, 1000
    );
    camera.position.z = 500;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.prepend(renderer.domElement);

    // === Фон (Perlin) ===
    const bgVert = `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`;
    const bgFrag = `
      varying vec2 vUv; uniform float uTime; uniform vec2 uResolution;
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
      float cnoise(vec3 P) {
        vec3 Pi0 = floor(P); vec3 Pi1 = Pi0 + vec3(1.0);
        Pi0 = mod289(Pi0); Pi1 = mod289(Pi1);
        vec3 Pf0 = fract(P); vec3 Pf1 = Pf0 - vec3(1.0);
        vec4 ix = vec4(Pi0.x, Pi1.x, Pi0.x, Pi1.x);
        vec4 iy = vec4(Pi0.yy, Pi1.yy);
        vec4 iz0 = Pi0.zzzz; vec4 iz1 = Pi1.zzzz;
        vec4 ixy = permute(permute(ix) + iy);
        vec4 ixy0 = permute(ixy + iz0); vec4 ixy1 = permute(ixy + iz1);
        vec4 gx0 = ixy0 * (1.0 / 7.0); vec4 gy0 = fract(floor(gx0) * (1.0 / 7.0)) - 0.5; gx0 = fract(gx0);
        vec4 gz0 = vec4(0.5) - abs(gx0) - abs(gy0); vec4 sz0 = step(gz0, vec4(0.0));
        gx0 -= sz0 * (step(0.0, gx0) - 0.5); gy0 -= sz0 * (step(0.0, gy0) - 0.5);
        vec4 gx1 = ixy1 * (1.0 / 7.0); vec4 gy1 = fract(floor(gx1) * (1.0 / 7.0)) - 0.5; gx1 = fract(gx1);
        vec4 gz1 = vec4(0.5) - abs(gx1) - abs(gy1); vec4 sz1 = step(gz1, vec4(0.0));
        gx1 -= sz1 * (step(0.0, gx1) - 0.5); gy1 -= sz1 * (step(0.0, gy1) - 0.5);
        vec3 g000 = vec3(gx0.x,gy0.x,gz0.x); vec3 g100 = vec3(gx0.y,gy0.y,gz0.y);
        vec3 g010 = vec3(gx0.z,gy0.z,gz0.z); vec3 g110 = vec3(gx0.w,gy0.w,gz0.w);
        vec3 g001 = vec3(gx1.x,gy1.x,gz1.x); vec3 g101 = vec3(gx1.y,gy1.y,gz1.y);
        vec3 g011 = vec3(gx1.z,gy1.z,gz1.z); vec3 g111 = vec3(gx1.w,gy1.w,gz1.w);
        vec4 norm0 = taylorInvSqrt(vec4(dot(g000,g000), dot(g010,g010), dot(g100,g100), dot(g110,g110)));
        g000 *= norm0.x; g010 *= norm0.y; g100 *= norm0.z; g110 *= norm0.w;
        vec4 norm1 = taylorInvSqrt(vec4(dot(g001,g001), dot(g011,g011), dot(g101,g101), dot(g111,g111)));
        g001 *= norm1.x; g011 *= norm1.y; g101 *= norm1.z; g111 *= norm1.w;
        float n000 = dot(g000, Pf0); float n100 = dot(g100, vec3(Pf1.x, Pf0.yz));
        float n010 = dot(g010, vec3(Pf0.x, Pf1.y, Pf0.z)); float n110 = dot(g110, vec3(Pf1.xy, Pf0.z));
        float n001 = dot(g001, vec3(Pf0.xy, Pf1.z)); float n101 = dot(g101, vec3(Pf1.x, Pf0.y, Pf1.z));
        float n011 = dot(g011, vec3(Pf0.x, Pf1.yz)); float n111 = dot(g111, Pf1);
        vec3 fade_xyz = Pf0 * Pf0 * Pf0 * (Pf0 * (Pf0 * 6.0 - 15.0) + 10.0);
        vec4 n_z = mix(vec4(n000, n100, n010, n110), vec4(n001, n101, n011, n111), fade_xyz.z);
        vec2 n_yz = mix(n_z.xy, n_z.zw, fade_xyz.y);
        float n_xyz = mix(n_yz.x, n_yz.y, fade_xyz.x);
        return 2.2 * n_xyz;
      }
      void main() {
        vec2 uv = vUv; float scale = 3.5; float timeFactor = 0.2;
        float n1 = cnoise(vec3(uv*scale, uTime*timeFactor*0.3));
        float n2 = cnoise(vec3(uv*scale*1.7+2.0, uTime*timeFactor*0.5+1.0));
        float pulse = 1.0 + 0.1*sin(uTime*0.3*6.2831);
        vec3 teal = vec3(0.0,0.55,0.55); vec3 purple = vec3(0.45,0.25,0.55);
        vec3 base = mix(teal, purple, n1*0.5+0.5);
        float bright = pulse * (0.75+0.35*n2);
        gl_FragColor = vec4(base*bright, 1.0);
      }`;
    const bgGeom = new THREE.PlaneGeometry(2,2);
    const bgMat = new THREE.ShaderMaterial({ vertexShader: bgVert, fragmentShader: bgFrag, uniforms: { uTime:{value:0}, uResolution:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)} }, depthWrite:false });
    const bgMesh = new THREE.Mesh(bgGeom, bgMat);
    bgMesh.renderOrder = -1; bgMesh.frustumCulled = false;
    scene.add(bgMesh);

    // === ТОЧКИ-СЛЕДЫ ===
    const allTags = ['радость','грусть','вдохновение','спокойствие','энергия'];
    const traces = [];
    for (let i=0; i<80; i++) {
      const tag = allTags[Math.floor(Math.random()*allTags.length)];
      traces.push({
        id: i, tags: [tag],
        x: (Math.random()-0.5)*600, y: (Math.random()-0.5)*600,
        baseSize: 10+Math.random()*5, phase: Math.random(),
        hue: allTags.indexOf(tag)/allTags.length, state:0
      });
    }
    const count = traces.length;
    const posArr = new Float32Array(count*3);
    const sizeArr = new Float32Array(count);
    const phaseArr = new Float32Array(count);
    const stateArr = new Float32Array(count);
    const colorArr = new Float32Array(count*3);
    for (let i=0; i<count; i++) {
      const t = traces[i];
      posArr[i*3]=t.x; posArr[i*3+1]=t.y; posArr[i*3+2]=0;
      sizeArr[i]=t.baseSize; phaseArr[i]=t.phase; stateArr[i]=t.state;
      const col = new THREE.Color().setHSL(t.hue,0.7,0.6);
      colorArr[i*3]=col.r; colorArr[i*3+1]=col.g; colorArr[i*3+2]=col.b;
    }
    const pointsGeom = new THREE.BufferGeometry();
    pointsGeom.setAttribute('position', new THREE.BufferAttribute(posArr,3));
    pointsGeom.setAttribute('size', new THREE.BufferAttribute(sizeArr,1));
    pointsGeom.setAttribute('aPhase', new THREE.BufferAttribute(phaseArr,1));
    pointsGeom.setAttribute('aState', new THREE.BufferAttribute(stateArr,1));
    pointsGeom.setAttribute('aColor', new THREE.BufferAttribute(colorArr,3));

    const pointsVert = `
      attribute float size; attribute float aPhase; attribute float aState; attribute vec3 aColor;
      varying float vState; varying float vPhase; varying vec3 vColor;
      uniform float uTime; uniform float uZoom;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position,1.0);
        gl_PointSize = size * uZoom * (200.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
        vState = aState; vPhase = aPhase; vColor = aColor;
      }`;
    const pointsFrag = `
      varying float vState; varying float vPhase; varying vec3 vColor;
      uniform float uTime; uniform float uHovered;
      void main(){
        vec2 uv = gl_PointCoord - 0.5; float dist = length(uv); float alpha = 0.0; vec3 col = vColor;
        if(vState==0.0){
          float pulse = 0.6+0.4*sin(uTime*2.0+vPhase*6.2831);
          alpha = smoothstep(0.5,0.0,dist)*pulse;
        } else if(vState==1.0){
          float angle = atan(uv.y,uv.x);
          float aurora = sin(angle*6.0+uTime*2.0)*0.5+0.5;
          col = mix(col, mix(vec3(0.0,1.0,0.6), vec3(0.8,0.2,1.0), aurora), uHovered);
          alpha = smoothstep(0.7,0.1,dist)*0.9;
        } else if(vState==2.0){
          alpha = smoothstep(0.5,0.0,dist)*1.0;
        }
        gl_FragColor = vec4(col,alpha);
      }`;
    const pointsMat = new THREE.ShaderMaterial({
      vertexShader: pointsVert, fragmentShader: pointsFrag,
      uniforms: { uTime:{value:0}, uZoom:{value:1.0}, uHovered:{value:0.0} },
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
    });
    const points = new THREE.Points(pointsGeom, pointsMat);
    scene.add(points);

    // === КАМЕРА ===
    let zoom = 1.0;
    const target = new THREE.Vector2(0,0);
    function updateCamera() {
      const a = window.innerWidth/window.innerHeight;
      const w = frustumSize*a/zoom, h = frustumSize/zoom;
      camera.left = target.x - w/2; camera.right = target.x + w/2;
      camera.top = target.y + h/2; camera.bottom = target.y - h/2;
      camera.updateProjectionMatrix();
    }
    updateCamera();

    // === НАВИГАЦИЯ ===
    window.addEventListener('wheel', e => {
      e.preventDefault();
      zoom *= e.deltaY<0 ? 1.08 : 0.92;
      zoom = Math.min(Math.max(zoom,0.2),4.0);
      updateCamera();
    }, {passive:false});

    let isDragging = false, lastMouse = new THREE.Vector2();
    window.addEventListener('mousedown', e => { if(e.button===0){ isDragging=true; lastMouse.set(e.clientX,e.clientY); } });
    window.addEventListener('mousemove', e => {
      if(isDragging){
        const dx = e.clientX-lastMouse.x, dy = e.clientY-lastMouse.y;
        const a = window.innerWidth/window.innerHeight;
        target.x -= dx*(frustumSize*a/zoom)/window.innerWidth;
        target.y += dy*(frustumSize/zoom)/window.innerHeight;
        lastMouse.set(e.clientX,e.clientY);
        updateCamera();
      }
    });
    window.addEventListener('mouseup', () => { isDragging=false; });

    // Тач-поддержка
    window.addEventListener('touchstart', e => {
      if(e.touches.length===1){ isDragging=true; lastMouse.set(e.touches[0].clientX,e.touches[0].clientY); }
    });
    window.addEventListener('touchmove', e => {
      if(isDragging && e.touches.length===1){
        const dx=e.touches[0].clientX-lastMouse.x, dy=e.touches[0].clientY-lastMouse.y;
        const a = window.innerWidth/window.innerHeight;
        target.x -= dx*(frustumSize*a/zoom)/window.innerWidth;
        target.y += dy*(frustumSize/zoom)/window.innerHeight;
        lastMouse.set(e.touches[0].clientX,e.touches[0].clientY);
        updateCamera();
        e.preventDefault();
      }
    }, {passive:false});
    window.addEventListener('touchend', () => { isDragging=false; });

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      bgMat.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
      updateCamera();
    });

    // === СОЗВЕЗДИЯ ===
    let linesGroup = null;
    function showConstellations(idx) {
      if(linesGroup) { scene.remove(linesGroup); linesGroup.geometry.dispose(); linesGroup.material.dispose(); linesGroup=null; }
      const center = traces[idx];
      const connected = [];
      traces.forEach((t,i)=>{ if(i!==idx && t.tags.some(tag=>center.tags.includes(tag))) connected.push(i); });
      if(connected.length===0) return;
      const verts = [];
      connected.forEach(i=>{ verts.push(center.x,center.y,0, traces[i].x,traces[i].y,0); });
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts),3));
      linesGroup = new THREE.LineSegments(geom, new THREE.LineBasicMaterial({color:0x88aaff,opacity:0.3,transparent:true}));
      scene.add(linesGroup);
    }

    // === РЕЙКАСТИНГ И ХОВЕР ===
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredIndex = -1;

    window.addEventListener('mousemove', e => {
      if(isDragging) return;
      mouse.x = (e.clientX / window.innerWidth)*2-1;
      mouse.y = -(e.clientY / window.innerHeight)*2+1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(points);
      if(intersects.length>0) {
        const idx = intersects[0].index;
        if(hoveredIndex !== idx) {
          if(hoveredIndex>=0){ stateArr[hoveredIndex]=0; traces[hoveredIndex].state=0; }
          stateArr[idx]=1; traces[idx].state=1; hoveredIndex=idx;
          pointsGeom.attributes.aState.needsUpdate=true;
          showConstellations(idx);
          if(navigator.vibrate) navigator.vibrate(15);
          // Скрываем оверлей и подсказку при наведении
          hideOverlay();
        }
      } else {
        if(hoveredIndex>=0) {
          stateArr[hoveredIndex]=0; traces[hoveredIndex].state=0;
          pointsGeom.attributes.aState.needsUpdate=true; hoveredIndex=-1;
          if(linesGroup){ scene.remove(linesGroup); linesGroup.geometry.dispose(); linesGroup.material.dispose(); linesGroup=null; }
          // Возвращаем оверлей, если мышь не над точкой
          showOverlay();
        }
      }
    });

    // Клик по точке (вибрация)
    window.addEventListener('click', () => {
      if(hoveredIndex>=0 && navigator.vibrate) navigator.vibrate(50);
    });

    // === АНИМАЦИЯ ===
    function animate() {
      requestAnimationFrame(animate);
      const t = performance.now()*0.001;
      bgMat.uniforms.uTime.value = t;
      pointsMat.uniforms.uTime.value = t;
      pointsMat.uniforms.uZoom.value = zoom;
      renderer.render(scene, camera);
    }
    animate();
    console.log('✨ Карта следов готова');
  </script>
</body>
</html>
