<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>#НАСЛЕДИ — Карта следов</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.85) 100%);
      backdrop-filter: blur(4px);
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .content { pointer-events: auto; color: #fff; max-width: 90vw; }
    h1 { font-size: clamp(2rem, 8vw, 5rem); font-weight: 200; letter-spacing: 0.12em; margin: 0; line-height: 1.1; }
    .tagline { font-size: clamp(0.9rem, 2.5vw, 1.3rem); opacity: 0.85; margin: 1.2rem 0 0; font-weight: 300; }
    .btn {
      display: inline-block; padding: 0.9rem 2.2rem; margin-top: 2rem;
      border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.12);
      color: white; text-decoration: none; border-radius: 50px; backdrop-filter: blur(6px);
      font-size: 1rem; transition: all 0.3s ease; cursor: pointer;
    }
    .btn:hover { background: rgba(255,255,255,0.25); box-shadow: 0 0 25px rgba(160,120,255,0.6); transform: translateY(-2px); }
    .footer { 
      position: absolute; bottom: 1.2rem; width: 100%; text-align: center; 
      color: rgba(255,255,255,0.6); font-size: 0.85rem; z-index: 5; pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    /* Индикатор активности (для отладки) */
    #debug {
      position: fixed; top: 12px; right: 12px; z-index: 20;
      background: rgba(10,10,25,0.7); padding: 8px 12px; border-radius: 8px;
      font-size: 11px; color: #8ad; border: 1px solid rgba(100,180,255,0.3);
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="content">
      <h1>Карта следов</h1>
      <p class="tagline">#НАСЛЕДИ — дышащая вселенная памяти</p>
      <a href="#" class="btn" id="enterBtn">Войти в созвездие</a>
    </div>
  </div>
  <div class="footer">наведите на точку • зум колёсиком • перетаскивайте</div>
  <div id="debug">Activity: <span id="val-act">0.40</span></div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    // ─────────────────────────────────────────────────────────────
    // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
    // ─────────────────────────────────────────────────────────────
    let activityIntensity = 0.4; // 0.0 – 1.0: глобальная активность
    const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;

    // ─────────────────────────────────────────────────────────────
    // СЦЕНА
    // ─────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const frustumSize = 1000;
    const aspect = window.innerWidth / window.innerHeight;
    const camera = new THREE.OrthographicCamera(
      frustumSize * aspect / -2, frustumSize * aspect / 2,
      frustumSize / 2, frustumSize / -2, 0.1, 1000
    );
    camera.position.z = 500;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.prepend(renderer.domElement);

    // ─────────────────────────────────────────────────────────────
    // ФОН С ШУМОМ ПЕРЛИНА + ДЫХАНИЕ
    // ─────────────────────────────────────────────────────────────
    const bgGeom = new THREE.PlaneGeometry(2, 2);
    const bgMat = new THREE.ShaderMaterial({
      vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `
        varying vec2 vUv;
        uniform float uTime;
        uniform float uIntensity; // ← НОВОЕ: активность
        
        // === cnoise (3D Classic Perlin) ===
        vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
        vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
        vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
        vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
        float cnoise(vec3 P){
          vec3 Pi0=floor(P);vec3 Pi1=Pi0+vec3(1.0);Pi0=mod289(Pi0);Pi1=mod289(Pi1);
          vec3 Pf0=fract(P);vec3 Pf1=Pf0-vec3(1.0);
          vec4 ix=vec4(Pi0.x,Pi1.x,Pi0.x,Pi1.x);vec4 iy=vec4(Pi0.yy,Pi1.yy);
          vec4 iz0=Pi0.zzzz;vec4 iz1=Pi1.zzzz;
          vec4 ixy=permute(permute(ix)+iy);
          vec4 ixy0=permute(ixy+iz0);vec4 ixy1=permute(ixy+iz1);
          vec4 gx0=ixy0*(1.0/7.0);vec4 gy0=fract(floor(gx0)*(1.0/7.0))-0.5;gx0=fract(gx0);
          vec4 gz0=vec4(0.5)-abs(gx0)-abs(gy0);vec4 sz0=step(gz0,vec4(0.0));
          gx0-=sz0*(step(0.0,gx0)-0.5);gy0-=sz0*(step(0.0,gy0)-0.5);
          vec4 gx1=ixy1*(1.0/7.0);vec4 gy1=fract(floor(gx1)*(1.0/7.0))-0.5;gx1=fract(gx1);
          vec4 gz1=vec4(0.5)-abs(gx1)-abs(gy1);vec4 sz1=step(gz1,vec4(0.0));
          gx1-=sz1*(step(0.0,gx1)-0.5);gy1-=sz1*(step(0.0,gy1)-0.5);
          vec3 g000=vec3(gx0.x,gy0.x,gz0.x);vec3 g100=vec3(gx0.y,gy0.y,gz0.y);
          vec3 g010=vec3(gx0.z,gy0.z,gz0.z);vec3 g110=vec3(gx0.w,gy0.w,gz0.w);
          vec3 g001=vec3(gx1.x,gy1.x,gz1.x);vec3 g101=vec3(gx1.y,gy1.y,gz1.y);
          vec3 g011=vec3(gx1.z,gy1.z,gz1.z);vec3 g111=vec3(gx1.w,gy1.w,gz1.w);
          vec4 norm0=taylorInvSqrt(vec4(dot(g000,g000),dot(g010,g010),dot(g100,g100),dot(g110,g110)));
          g000*=norm0.x;g010*=norm0.y;g100*=norm0.z;g110*=norm0.w;
          vec4 norm1=taylorInvSqrt(vec4(dot(g001,g001),dot(g011,g011),dot(g101,g101),dot(g111,g111)));
          g001*=norm1.x;g011*=norm1.y;g101*=norm1.z;g111*=norm1.w;
          float n000=dot(g000,Pf0);float n100=dot(g100,vec3(Pf1.x,Pf0.yz));
          float n010=dot(g010,vec3(Pf0.x,Pf1.y,Pf0.z));float n110=dot(g110,vec3(Pf1.xy,Pf0.z));
          float n001=dot(g001,vec3(Pf0.xy,Pf1.z));float n101=dot(g101,vec3(Pf1.x,Pf0.y,Pf1.z));
          float n011=dot(g011,vec3(Pf0.x,Pf1.yz));float n111=dot(g111,Pf1);
          vec3 fade_xyz=Pf0*Pf0*Pf0*(Pf0*(Pf0*6.0-15.0)+10.0);
          vec4 n_z=mix(vec4(n000,n100,n010,n110),vec4(n001,n101,n011,n111),fade_xyz.z);
          vec2 n_yz=mix(n_z.xy,n_z.zw,fade_xyz.y);
          float n_xyz=mix(n_yz.x,n_yz.y,fade_xyz.x);
          return 2.2*n_xyz;
        }
        
        void main() {
          vec2 uv = vUv;
          float scale = 3.5;
          float timeFactor = 0.2;
          
          // === ДЫХАНИЕ: цикл зависит от uIntensity ===
          float cycle = mix(15.0, 2.0, clamp(uIntensity, 0.0, 1.0));
          float pulse = 1.0 + 0.12 * sin(uTime * (6.2831 / cycle));
          
          float n1 = cnoise(vec3(uv*scale, uTime*timeFactor*0.3));
          float n2 = cnoise(vec3(uv*scale*1.7+2.0, uTime*timeFactor*0.5+1.0));
          
          vec3 teal = vec3(0.0, 0.52, 0.52);
          vec3 purple = vec3(0.42, 0.22, 0.52);
          vec3 base = mix(teal, purple, n1*0.5 + 0.5);
          
          float bright = pulse * (0.72 + 0.38 * n2) * (0.9 + uIntensity*0.2);
          gl_FragColor = vec4(base * bright, 1.0);
        }`,
      uniforms: {
        uTime: { value: 0 },
        uIntensity: { value: activityIntensity }, // ← ПЕРЕДАЁМ
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
      },
      depthWrite: false
    });
    const bgMesh = new THREE.Mesh(bgGeom, bgMat);
    bgMesh.renderOrder = -1;
    bgMesh.frustumCulled = false;
    scene.add(bgMesh);

    // ─────────────────────────────────────────────────────────────
    // ТОЧКИ-СЛЕДЫ
    // ─────────────────────────────────────────────────────────────
    const allTags = ['радость','грусть','вдохновение','спокойствие','энергия'];
    const traces = [];
    
    for (let i = 0; i < 80; i++) {
      const tag = allTags[Math.floor(Math.random() * allTags.length)];
      traces.push({
        id: i,
        tags: [tag],
        x: (Math.random() - 0.5) * 600,
        y: (Math.random() - 0.5) * 600,
        state: 'stasis',
        baseSize: 10 + Math.random() * 5,
        phase: Math.random() * 6.2831,
        hue: allTags.indexOf(tag) / allTags.length,
        createdAt: Date.now(), // ← ДЛЯ УГАСАНИЯ
        maxAge: TWENTY_FOUR_HOURS,
        audioAmp: 0.3 + Math.random() * 0.7, // ← ДЛЯ РЕЗОНАНСА
        audioFreq: 0.8 + Math.random() * 2.5
      });
    }

    const posArr = new Float32Array(traces.length * 3);
    const sizeArr = new Float32Array(traces.length);
    const phaseArr = new Float32Array(traces.length);
    const stateArr = new Float32Array(traces.length);
    const colorArr = new Float32Array(traces.length * 3);
    const ageArr = new Float32Array(traces.length); // ← НОВОЕ: возраст

    traces.forEach((t, i) => {
      posArr[i*3] = t.x; posArr[i*3+1] = t.y; posArr[i*3+2] = 0;
      sizeArr[i] = t.baseSize;
      phaseArr[i] = t.phase;
      stateArr[i] = 0; // stasis
      ageArr[i] = 0;
      const col = new THREE.Color().setHSL(t.hue, 0.75, 0.65);
      colorArr[i*3] = col.r; colorArr[i*3+1] = col.g; colorArr[i*3+2] = col.b;
    });

    const pointsGeom = new THREE.BufferGeometry();
    pointsGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    pointsGeom.setAttribute('size', new THREE.BufferAttribute(sizeArr, 1));
    pointsGeom.setAttribute('aPhase', new THREE.BufferAttribute(phaseArr, 1));
    pointsGeom.setAttribute('aState', new THREE.BufferAttribute(stateArr, 1));
    pointsGeom.setAttribute('aColor', new THREE.BufferAttribute(colorArr, 3));
    pointsGeom.setAttribute('aAge', new THREE.BufferAttribute(ageArr, 1)); // ← ДОБАВЛЯЕМ

    const pointsMat = new THREE.ShaderMaterial({
      vertexShader: `
        attribute float size;
        attribute float aPhase;
        attribute float aState;
        attribute float aAge;
        attribute vec3 aColor;
        varying float vState;
        varying float vPhase;
        varying vec3 vColor;
        varying float vAge;
        uniform float uTime;
        uniform float uZoom;
        
        void main(){
          vec3 pos = position;
          
          // === РЕЗОНАНС: вибрация на основе аудио-данных ===
          if (aState == 2.0) {
            float shake = sin(uTime * 18.0 + aPhase * 12.0) * aAge * 0.8;
            pos.x += shake;
            pos.y += shake * 0.6;
          }
          
          vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = size * uZoom * (200.0 / -mvPosition.z) * (1.0 - aAge * 0.3);
          gl_Position = projectionMatrix * mvPosition;
          
          vState = aState;
          vPhase = aPhase;
          vColor = aColor;
          vAge = aAge;
        }`,
      fragmentShader: `
        varying float vState;
        varying float vPhase;
        varying vec3 vColor;
        varying float vAge;
        uniform float uTime;
        uniform float uZoom;
        uniform float uHovered; // ← ИСПРАВЛЕНО: теперь работает
        
        void main(){
          vec2 uv = gl_PointCoord - 0.5;
          float dist = length(uv);
          if (dist > 0.52) discard;
          
          float alpha = 0.0;
          vec3 col = vColor;
          
          // === УГАСАНИЕ: плавное снижение яркости ===
          float decay = 1.0 - smoothstep(0.7, 1.0, vAge);
          
          if (vState == 0.0) {
            // СТАЗИС: индивидуальная пульсация
            float pulse = 0.65 + 0.35 * sin(uTime * 1.8 + vPhase);
            alpha = smoothstep(0.5, 0.05, dist) * pulse;
          } 
          else if (vState == 1.0) {
            // ЭМИССИЯ: северное сияние (активируется при uHovered > 0.5)
            float angle = atan(uv.y, uv.x);
            float aurora = sin(angle * 7.0 + uTime * 2.5) * 0.5 + 0.5;
            vec3 auroraCol = mix(vec3(0.1, 0.95, 0.7), vec3(0.75, 0.3, 0.95), aurora);
            col = mix(col, auroraCol, uHovered * 0.9);
            alpha = smoothstep(0.65, 0.1, dist) * (0.85 + uHovered * 0.15);
          } 
          else if (vState == 2.0) {
            // РЕЗОНАНС: яркое мерцание
            float flicker = 0.7 + 0.3 * sin(uTime * 10.0 + vPhase * 5.0);
            alpha = smoothstep(0.5, 0.0, dist) * flicker;
            col = mix(col, vec3(1.0, 0.6, 0.8), 0.3);
          }
          
          // Применяем угасание
          alpha *= decay;
          col *= decay;
          
          // Добавляем мягкое свечение по краям
          float glow = smoothstep(0.3, 0.0, dist) * 0.2;
          alpha += glow * decay;
          
          gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
        }`,
      uniforms: { 
        uTime: { value: 0 }, 
        uZoom: { value: 1.0 }, 
        uHovered: { value: 0.0 } // ← ИСПРАВЛЕНО: будет обновляться
      },
      transparent: true, 
      depthWrite: false, 
      blending: THREE.AdditiveBlending
    });
    
    const points = new THREE.Points(pointsGeom, pointsMat);
    scene.add(points);

    // ─────────────────────────────────────────────────────────────
    // КАМЕРА: ПАНОРАМИРОВАНИЕ И ЗУМ
    // ─────────────────────────────────────────────────────────────
    let zoom = 1.0;
    const target = new THREE.Vector2(0, 0);
    
    function updateCamera() {
      const aspect = window.innerWidth / window.innerHeight;
      const w = frustumSize * aspect / zoom;
      const h = frustumSize / zoom;
      camera.left = target.x - w / 2;
      camera.right = target.x + w / 2;
      camera.top = target.y + h / 2;
      camera.bottom = target.y - h / 2;
      camera.updateProjectionMatrix();
    }
    updateCamera();

    window.addEventListener('wheel', e => {
      e.preventDefault();
      zoom *= e.deltaY < 0 ? 1.08 : 0.92;
      zoom = THREE.MathUtils.clamp(zoom, 0.25, 3.5);
      updateCamera();
    }, { passive: false });

    let isDragging = false, lastMouse = new THREE.Vector2();
    
    window.addEventListener('mousedown', e => {
      if (e.button === 0) {
        isDragging = true;
        lastMouse.set(e.clientX, e.clientY);
      }
    });
    
    window.addEventListener('mousemove', e => {
      if (isDragging) {
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        const aspect = window.innerWidth / window.innerHeight;
        target.x -= dx * (frustumSize * aspect / zoom) / window.innerWidth;
        target.y += dy * (frustumSize / zoom) / window.innerHeight;
        lastMouse.set(e.clientX, e.clientY);
        updateCamera();
      }
    });
    
    window.addEventListener('mouseup', () => { isDragging = false; });

    // Тач-поддержка
    window.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        isDragging = true;
        lastMouse.set(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });
    
    window.addEventListener('touchmove', e => {
      if (isDragging && e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastMouse.x;
        const dy = e.touches[0].clientY - lastMouse.y;
        const aspect = window.innerWidth / window.innerHeight;
        target.x -= dx * (frustumSize * aspect / zoom) / window.innerWidth;
        target.y += dy * (frustumSize / zoom) / window.innerHeight;
        lastMouse.set(e.touches[0].clientX, e.touches[0].clientY);
        updateCamera();
      }
    }, { passive: false });
    
    window.addEventListener('touchend', () => { isDragging = false; });

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      bgMat.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
      updateCamera();
    });

    // ─────────────────────────────────────────────────────────────
    // СОЗВЕЗДИЯ (линии при наведении)
    // ─────────────────────────────────────────────────────────────
    let lines = null;
    
    function showConstellations(idx) {
      if (lines) {
        scene.remove(lines);
        lines.geometry.dispose();
        lines.material.dispose();
        lines = null;
      }
      const center = traces[idx];
      const connected = [];
      
      traces.forEach((t, i) => {
        if (i !== idx && t.tags.some(tag => center.tags.includes(tag))) {
          connected.push(i);
        }
      });
      
      if (connected.length === 0) return;
      
      const arr = [];
      connected.forEach(i => {
        arr.push(center.x, center.y, 0, traces[i].x, traces[i].y, 0);
      });
      
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(arr), 3));
      lines = new THREE.LineSegments(
        geom, 
        new THREE.LineBasicMaterial({ 
          color: 0x99bbff, 
          opacity: 0.35, 
          transparent: true,
          linewidth: 1
        })
      );
      scene.add(lines);
    }

    // ─────────────────────────────────────────────────────────────
    // RAYCASTER ДЛЯ ХОВЕРА + HAPTIC
    // ─────────────────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredIndex = -1;
    
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(points);
      
      if (intersects.length > 0 && !isDragging) {
        const idx = intersects[0].index;
        
        if (hoveredIndex !== idx) {
          // Сброс предыдущего
          if (hoveredIndex >= 0) {
            stateArr[hoveredIndex] = 0;
          }
          // Активация нового
          stateArr[idx] = 1; // emission
          hoveredIndex = idx;
          
          pointsGeom.attributes.aState.needsUpdate = true;
          pointsMat.uniforms.uHovered.value = 1.0; // ← ИСПРАВЛЕНО: включаем аврору
          
          showConstellations(idx);
          
          // Haptic feedback
          if (navigator.vibrate) {
            navigator.vibrate(15);
          }
        }
      } else {
        if (hoveredIndex >= 0) {
          stateArr[hoveredIndex] = 0;
          pointsGeom.attributes.aState.needsUpdate = true;
          pointsMat.uniforms.uHovered.value = 0.0; // ← ИСПРАВЛЕНО: выключаем аврору
          hoveredIndex = -1;
          
          if (lines) {
            scene.remove(lines);
            lines.geometry.dispose();
            lines.material.dispose();
            lines = null;
          }
        }
      }
    });

    // Haptic по клику
    window.addEventListener('click', () => {
      if (hoveredIndex >= 0 && navigator.vibrate) {
        navigator.vibrate([10, 20, 10]);
      }
    });

    // ─────────────────────────────────────────────────────────────
    // КНОПКА "ВОЙТИ В СОЗВЕЗДИЕ"
    // ─────────────────────────────────────────────────────────────
    document.getElementById('enterBtn').addEventListener('click', (e) => {
      e.preventDefault();
      const overlay = document.getElementById('overlay');
      overlay.classList.add('hidden');
      
      // Плавный зум на случайную точку
      const randomIdx = Math.floor(Math.random() * traces.length);
      target.x = traces[randomIdx].x;
      target.y = traces[randomIdx].y;
      zoom = 1.8;
      updateCamera();
    });

    // ─────────────────────────────────────────────────────────────
    // ОБНОВЛЕНИЕ ВОЗРАСТА ТОЧЕК (УГАСАНИЕ)
    // ─────────────────────────────────────────────────────────────
    function updateTraceAges() {
      const now = Date.now();
      const ageAttr = pointsGeom.attributes.aAge;
      let needsUpdate = false;
      
      for (let i = 0; i < traces.length; i++) {
        const t = traces[i];
        const age = Math.min((now - t.createdAt) / t.maxAge, 1.0);
        
        if (Math.abs(ageAttr.getX(i) - age) > 0.005) {
          ageAttr.setX(i, age);
          needsUpdate = true;
        }
        
        // Конвертация в "микро-туманность" при полном угасании
        if (age >= 0.99 && t.state !== 'decayed') {
          t.state = 'decayed';
          stateArr[i] = 0; // переводим в стазис (фон)
          pointsGeom.attributes.aState.needsUpdate = true;
          
          // Вибрация при "последнем вздохе"
          if (navigator.vibrate) navigator.vibrate(8);
        }
      }
      
      if (needsUpdate) {
        ageAttr.needsUpdate = true;
      }
    }

    // ─────────────────────────────────────────────────────────────
    // ДЕМО: АВТО-ИЗМЕНЕНИЕ АКТИВНОСТИ (для теста "дыхания")
    // ─────────────────────────────────────────────────────────────
    setInterval(() => {
      // Плавная синусоида + небольшой рандом для естественности
      activityIntensity = 0.35 + Math.sin(Date.now() * 0.0004) * 0.35 + Math.random() * 0.1;
      activityIntensity = THREE.MathUtils.clamp(activityIntensity, 0.0, 1.0);
      
      bgMat.uniforms.uIntensity.value = activityIntensity;
      document.getElementById('val-act').textContent = activityIntensity.toFixed(2);
    }, 1500);

    // ─────────────────────────────────────────────────────────────
    // АНИМАЦИОННЫЙ ЦИКЛ
    // ─────────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      const t = performance.now() * 0.001;
      
      // Обновляем шейдеры
      bgMat.uniforms.uTime.value = t;
      pointsMat.uniforms.uTime.value = t;
      pointsMat.uniforms.uZoom.value = zoom;
      
      // Обновляем возраст точек (угасание)
      updateTraceAges();
      
      // Рендер
      renderer.render(scene, camera);
    }
    
    animate();

    // ─────────────────────────────────────────────────────────────
    // ПУБЛИЧНЫЙ API (для интеграции с бэкендом / приложением)
    // ─────────────────────────────────────────────────────────────
    window.UniverseAPI = {
      setActivity: (val) => {
        activityIntensity = THREE.MathUtils.clamp(val, 0, 1);
        bgMat.uniforms.uIntensity.value = activityIntensity;
      },
      addTrace: (data) => {
        // Упрощённая версия: добавляет точку в реальном времени
        // Для продакшена нужно расширять буферы динамически
        console.log('addTrace:', data);
      },
      getState: () => ({
        activity: activityIntensity,
        traceCount: traces.length,
        zoom: zoom
      })
    };
  </script>
</body>
</html>
