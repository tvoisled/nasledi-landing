<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>#НАСЛЕДИ — Карта следов</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%);
      backdrop-filter: blur(3px);
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .overlay .content { pointer-events: auto; transition: opacity 0.5s ease, transform 0.5s ease; }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay.hidden .content { transform: translateY(30px); }

    h1 { font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 300; letter-spacing: 0.15em; margin: 0; color: #fff; }
    .tagline { font-size: 1.2rem; opacity: 0.8; margin: 1rem 0; color: #fff; }
    .btn {
      display: inline-block; padding: 0.8rem 2rem; margin-top: 1.5rem;
      border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1);
      color: white; text-decoration: none; border-radius: 40px;
      font-size: 1rem; transition: 0.3s; cursor: pointer;
    }
    .btn:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 20px rgba(180,130,255,0.5); }

    .footer {
      position: absolute; bottom: 3rem; width: 100%; text-align: center;
      color: #aaa; font-size: 0.9rem; z-index: 1; pointer-events: none;
      transition: opacity 0.8s;
    }
    .footer.hidden { opacity: 0; }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
    }
    .modal.active { display: flex; }
    .modal-box {
      background: #1a1a2e; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 2rem; max-width: 350px; text-align: center; color: white;
    }
    .modal-box input {
      width: 100%; padding: 0.7rem; margin: 1rem 0; border: 1px solid #666;
      background: #2a2a3a; color: white; border-radius: 8px; font-size: 1rem;
    }
    .modal-box button {
      background: #5a4a9a; border: none; padding: 0.7rem 2rem; color: white;
      border-radius: 40px; font-size: 1rem; cursor: pointer;
    }
    .modal-box .close { float: right; cursor: pointer; font-size: 1.5rem; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="content">
      <h1>Карта следов</h1>
      <p class="tagline">#НАСЛЕДИ — дышащая вселенная памяти</p>
      <button class="btn" id="enterBtn">Войти в созвездие</button>
    </div>
  </div>
  <div class="footer" id="footerHint">исследуйте карту — наведите на точку</div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <span class="close" id="closeModal">&times;</span>
      <h2 style="margin-top:0">Присоединиться к #НАСЛЕДИ</h2>
      <p>Оставьте email, и мы пришлём приглашение на открытие</p>
      <input type="email" placeholder="ваш@email.ru" />
      <button>Отправить</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // ==================== ЛОГИКА ОВЕРЛЕЯ И МОДАЛКИ ====================
    const overlay = document.getElementById('overlay');
    const footerHint = document.getElementById('footerHint');
    const enterBtn = document.getElementById('enterBtn');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');

    let hintHidden = false;
    function hideOverlay() {
      overlay.classList.add('hidden');
      if (!hintHidden) { footerHint.classList.add('hidden'); hintHidden = true; }
    }
    function showOverlay() {
      overlay.classList.remove('hidden');
    }

    enterBtn.addEventListener('click', e => {
      e.preventDefault();
      modal.classList.add('active');
    });
    closeModal.addEventListener('click', () => modal.classList.remove('active'));
    window.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });

    // ==================== THREE.JS СЦЕНА ====================
    const scene = new THREE.Scene();
    const aspect = window.innerWidth / window.innerHeight;
    const frustumSize = 1000;
    const camera = new THREE.OrthographicCamera(
      frustumSize * aspect / -2, frustumSize * aspect / 2,
      frustumSize / 2, frustumSize / -2, 0.1, 1000
    );
    camera.position.z = 500;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.prepend(renderer.domElement);

    // --- ПРОСТОЙ ФОН: пульсирующий градиент ---
    const bgGeom = new THREE.PlaneGeometry(2, 2);
    const bgMat = new THREE.ShaderMaterial({
      vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float uTime;
        void main() {
          float pulse = 0.7 + 0.3 * sin(uTime * 0.6 + vUv.x * 2.0);
          vec3 teal = vec3(0.0, 0.55, 0.55);
          vec3 purple = vec3(0.45, 0.25, 0.55);
          vec3 col = mix(teal, purple, vUv.x * 0.5 + 0.5 + 0.2 * sin(uTime * 0.3));
          gl_FragColor = vec4(col * pulse, 1.0);
        }
      `,
      uniforms: { uTime: { value: 0 } },
      depthWrite: false
    });
    const bgMesh = new THREE.Mesh(bgGeom, bgMat);
    bgMesh.renderOrder = -1;
    bgMesh.frustumCulled = false;
    scene.add(bgMesh);

    // --- ТОЧКИ-ЗВЁЗДЫ (используем стандартный PointsMaterial) ---
    const tracesCount = 80;
    const positions = new Float32Array(tracesCount * 3);
    const colors = new Float32Array(tracesCount * 3);
    const sizes = new Float32Array(tracesCount);
    const allTags = ['радость','грусть','вдохновение','спокойствие','энергия'];
    const traces = [];

    for (let i = 0; i < tracesCount; i++) {
      const tag = allTags[Math.floor(Math.random() * allTags.length)];
      positions[i * 3] = (Math.random() - 0.5) * 600;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 600;
      positions[i * 3 + 2] = 0;
      const hue = allTags.indexOf(tag) / allTags.length;
      const color = new THREE.Color().setHSL(hue, 0.7, 0.6);
      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;
      sizes[i] = 8 + Math.random() * 5;
      traces.push({ id: i, tags: [tag], x: positions[i * 3], y: positions[i * 3 + 1], state: 0 });
    }

    const pointsGeom = new THREE.BufferGeometry();
    pointsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    pointsGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    pointsGeom.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    // Шейдерный материал с поддержкой переменного размера и пульсации
    const pointsVert = `
      attribute float size;
      varying vec3 vColor;
      uniform float uTime;
      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        // Пульсация размера
        float pulse = 0.7 + 0.3 * sin(uTime * 3.0 + position.x * 0.1 + position.y * 0.1);
        gl_PointSize = size * pulse * (200.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
        vColor = color;
      }
    `;
    const pointsFrag = `
      varying vec3 vColor;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float dist = length(uv);
        float alpha = smoothstep(0.5, 0.1, dist);
        gl_FragColor = vec4(vColor, alpha);
      }
    `;
    const pointsMat = new THREE.ShaderMaterial({
      vertexShader: pointsVert,
      fragmentShader: pointsFrag,
      uniforms: { uTime: { value: 0 } },
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true
    });

    const points = new THREE.Points(pointsGeom, pointsMat);
    scene.add(points);

    // --- КАМЕРА И НАВИГАЦИЯ ---
    let zoom = 1.0;
    const target = new THREE.Vector2(0, 0);
    function updateCamera() {
      const a = window.innerWidth / window.innerHeight;
      const w = frustumSize * a / zoom;
      const h = frustumSize / zoom;
      camera.left = target.x - w / 2;
      camera.right = target.x + w / 2;
      camera.top = target.y + h / 2;
      camera.bottom = target.y - h / 2;
      camera.updateProjectionMatrix();
    }
    updateCamera();

    window.addEventListener('wheel', e => {
      e.preventDefault();
      zoom *= e.deltaY < 0 ? 1.08 : 0.92;
      zoom = Math.min(Math.max(zoom, 0.2), 4.0);
      updateCamera();
    }, { passive: false });

    let isDragging = false, lastMouse = new THREE.Vector2();
    window.addEventListener('mousedown', e => {
      if (e.button === 0) { isDragging = true; lastMouse.set(e.clientX, e.clientY); }
    });
    window.addEventListener('mousemove', e => {
      if (isDragging) {
        const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
        const a = window.innerWidth / window.innerHeight;
        target.x -= dx * (frustumSize * a / zoom) / window.innerWidth;
        target.y += dy * (frustumSize / zoom) / window.innerHeight;
        lastMouse.set(e.clientX, e.clientY);
        updateCamera();
      }
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    // Тач-поддержка
    window.addEventListener('touchstart', e => {
      if (e.touches.length === 1) { isDragging = true; lastMouse.set(e.touches[0].clientX, e.touches[0].clientY); }
    });
    window.addEventListener('touchmove', e => {
      if (isDragging && e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastMouse.x, dy = e.touches[0].clientY - lastMouse.y;
        const a = window.innerWidth / window.innerHeight;
        target.x -= dx * (frustumSize * a / zoom) / window.innerWidth;
        target.y += dy * (frustumSize / zoom) / window.innerHeight;
        lastMouse.set(e.touches[0].clientX, e.touches[0].clientY);
        updateCamera();
        e.preventDefault();
      }
    }, { passive: false });
    window.addEventListener('touchend', () => { isDragging = false; });

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateCamera();
    });

    // --- СОЗВЕЗДИЯ (линии при наведении) ---
    let linesGroup = null;
    function showConstellations(idx) {
      if (linesGroup) { scene.remove(linesGroup); linesGroup.geometry.dispose(); linesGroup.material.dispose(); linesGroup = null; }
      const center = traces[idx];
      const connected = [];
      traces.forEach((t, i) => {
        if (i !== idx && t.tags.some(tag => center.tags.includes(tag))) connected.push(i);
      });
      if (connected.length === 0) return;
      const verts = [];
      connected.forEach(i => { verts.push(center.x, center.y, 0, traces[i].x, traces[i].y, 0); });
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
      linesGroup = new THREE.LineSegments(geom, new THREE.LineBasicMaterial({ color: 0x88aaff, opacity: 0.4, transparent: true }));
      scene.add(linesGroup);
    }

    // --- РЕЙКАСТИНГ И ХОВЕР ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredIndex = -1;

    window.addEventListener('mousemove', e => {
      if (isDragging) return;
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(points);
      if (intersects.length > 0) {
        const idx = intersects[0].index;
        if (hoveredIndex !== idx) {
          hoveredIndex = idx;
          showConstellations(idx);
          hideOverlay();
          if (navigator.vibrate) navigator.vibrate(15);
        }
      } else {
        if (hoveredIndex >= 0) {
          hoveredIndex = -1;
          if (linesGroup) { scene.remove(linesGroup); linesGroup.geometry.dispose(); linesGroup.material.dispose(); linesGroup = null; }
          showOverlay();
        }
      }
    });

    // Вибрация при клике по точке
    window.addEventListener('click', () => {
      if (hoveredIndex >= 0 && navigator.vibrate) navigator.vibrate(50);
    });

    // --- АНИМАЦИЯ ---
    function animate() {
      requestAnimationFrame(animate);
      const t = performance.now() * 0.001;
      bgMat.uniforms.uTime.value = t;
      pointsMat.uniforms.uTime.value = t;
      renderer.render(scene, camera);
    }
    animate();
    console.log('✨ Карта следов активна');
  </script>
</body>
</html>
